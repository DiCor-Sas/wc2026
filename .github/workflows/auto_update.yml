# Resynced 2026-06-11 — pre-match lineup/pipeline timing fix
# External cron-job.org backup active
# Pipeline reruns 45min before kickoff, lineup fetch 50min before kickoff,
# Telegram reminder 20min before kickoff (separate workflow, unchanged)
name: Auto Update WC 2026 Dashboard

permissions:
  contents: write
  pages: write
  id-token: write

env:
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  schedule:
    # Main pipeline — every 2 hours from 10:00 to 02:00 UTC (12 runs per day)
    - cron: "0 10,12,14,16,18,20,22,0,2 * * *"
    # Pre-match pipeline reruns — 45 min before each COT kickoff window (UTC)
    - cron: "15 15 * * *"   # 10:15 COT (11:00 COT kickoff)
    - cron: "15 16 * * *"   # 11:15 COT (12:00 COT kickoff)
    - cron: "15 17 * * *"   # 12:15 COT (13:00 COT kickoff)
    - cron: "15 18 * * *"   # 13:15 COT (14:00 COT kickoff)
    - cron: "15 19 * * *"   # 14:15 COT (15:00 COT kickoff)
    - cron: "45 19 * * *"   # 14:45 COT (15:30 COT kickoff)
    - cron: "15 20 * * *"   # 15:15 COT (16:00 COT kickoff)
    - cron: "15 21 * * *"   # 16:15 COT (17:00 COT kickoff)
    - cron: "15 22 * * *"   # 17:15 COT (18:00 COT kickoff)
    - cron: "45 22 * * *"   # 17:45 COT (18:30 COT kickoff)
    - cron: "15 23 * * *"   # 18:15 COT (19:00 COT kickoff)
    - cron: "45 23 * * *"   # 18:45 COT (19:30 COT kickoff)
    - cron: "15 0 * * *"    # 19:15 COT (20:00 COT kickoff)
    - cron: "45 0 * * *"    # 19:45 COT (20:30 COT kickoff)
    - cron: "15 1 * * *"    # 20:15 COT (21:00 COT kickoff)
    - cron: "15 2 * * *"    # 21:15 COT (22:00 COT kickoff)
    - cron: "15 3 * * *"    # 22:15 COT (23:00 COT kickoff)
    # Lineup fetch triggers — 50 min before each COT kickoff window (UTC)
    - cron: "10 15 * * *"   # 10:10 COT (11:00 COT kickoff)
    - cron: "10 16 * * *"   # 11:10 COT (12:00 COT kickoff)
    - cron: "10 17 * * *"   # 12:10 COT (13:00 COT kickoff)
    - cron: "10 18 * * *"   # 13:10 COT (14:00 COT kickoff)
    - cron: "10 19 * * *"   # 14:10 COT (15:00 COT kickoff)
    - cron: "40 19 * * *"   # 14:40 COT (15:30 COT kickoff)
    - cron: "10 20 * * *"   # 15:10 COT (16:00 COT kickoff)
    - cron: "10 21 * * *"   # 16:10 COT (17:00 COT kickoff)
    - cron: "10 22 * * *"   # 17:10 COT (18:00 COT kickoff)
    - cron: "40 22 * * *"   # 17:40 COT (18:30 COT kickoff)
    - cron: "10 23 * * *"   # 18:10 COT (19:00 COT kickoff)
    - cron: "40 23 * * *"   # 18:40 COT (19:30 COT kickoff)
    - cron: "10 0 * * *"    # 19:10 COT (20:00 COT kickoff)
    - cron: "40 0 * * *"    # 19:40 COT (20:30 COT kickoff)
    - cron: "10 1 * * *"    # 20:10 COT (21:00 COT kickoff)
    - cron: "10 2 * * *"    # 21:10 COT (22:00 COT kickoff)
    - cron: "10 3 * * *"    # 22:10 COT (23:00 COT kickoff)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '0 10,12,14,16,18,20,22,0,2 * * *' ||
      github.event.schedule == '15 15 * * *' ||
      github.event.schedule == '15 16 * * *' ||
      github.event.schedule == '15 17 * * *' ||
      github.event.schedule == '15 18 * * *' ||
      github.event.schedule == '15 19 * * *' ||
      github.event.schedule == '45 19 * * *' ||
      github.event.schedule == '15 20 * * *' ||
      github.event.schedule == '15 21 * * *' ||
      github.event.schedule == '15 22 * * *' ||
      github.event.schedule == '45 22 * * *' ||
      github.event.schedule == '15 23 * * *' ||
      github.event.schedule == '45 23 * * *' ||
      github.event.schedule == '15 0 * * *' ||
      github.event.schedule == '45 0 * * *' ||
      github.event.schedule == '15 1 * * *' ||
      github.event.schedule == '15 2 * * *' ||
      github.event.schedule == '15 3 * * *'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure git for push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify project structure
        run: |
          echo "Working dir: $(pwd)"
          ls -la
          test -f requirements.txt && \
          echo "requirements.txt FOUND" || \
          echo "requirements.txt MISSING"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          pip install playwright
          playwright install chromium
        continue-on-error: true

      - name: Run full pipeline
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python3 update_results.py

      - name: Commit and push if changed
        run: |
          git add wc2026_results.json bracket_state.json elo_ratings.json \
                  team_strength.json predictions.json index.html \
                  version.txt daily_results.json lineups.json 2>/dev/null || true

          git diff --quiet && git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "auto update [$(date -u '+%Y-%m-%d %H:%M UTC')]"

          for i in 1 2 3; do
            git pull --rebase --no-edit origin main && \
            git push origin main && \
            break
            echo "Push attempt $i failed, retrying..."
            sleep $((i * 10))
          done

  lineup_fetch:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'schedule' &&
      (github.event.schedule == '10 15 * * *' ||
       github.event.schedule == '10 16 * * *' ||
       github.event.schedule == '10 17 * * *' ||
       github.event.schedule == '10 18 * * *' ||
       github.event.schedule == '10 19 * * *' ||
       github.event.schedule == '40 19 * * *' ||
       github.event.schedule == '10 20 * * *' ||
       github.event.schedule == '10 21 * * *' ||
       github.event.schedule == '10 22 * * *' ||
       github.event.schedule == '40 22 * * *' ||
       github.event.schedule == '10 23 * * *' ||
       github.event.schedule == '40 23 * * *' ||
       github.event.schedule == '10 0 * * *' ||
       github.event.schedule == '40 0 * * *' ||
       github.event.schedule == '10 1 * * *' ||
       github.event.schedule == '10 2 * * *' ||
       github.event.schedule == '10 3 * * *'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure git for push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify project structure
        run: |
          echo "Working dir: $(pwd)"
          ls -la
          test -f requirements.txt && \
          echo "requirements.txt FOUND" || \
          echo "requirements.txt MISSING"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          pip install playwright
          playwright install chromium
        continue-on-error: true

      - name: Fetch lineups for upcoming matches
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python3 fetch_results.py --lineup-only

      - name: Regenerate dashboard if lineups changed
        run: |
          if git diff --quiet -- lineups.json; then
            echo "No lineup changes, skipping regeneration"
          else
            python3 generate_index.py
          fi

      - name: Commit lineup data if changed
        run: |
          git add lineups.json 2>/dev/null || true
          if [ -f match_adjustments.json ]; then
            git add match_adjustments.json
          fi
          git add index.html version.txt 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No lineup changes to commit"
            exit 0
          fi
          git commit -m "lineup update [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git pull --rebase --no-edit origin main
          git push origin main
