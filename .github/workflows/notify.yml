name: Telegram Match Reminder

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  schedule:
    - cron: "40 15 * * *"  # 11:00 COT kickoffs
    - cron: "40 16 * * *"  # 12:00 COT kickoffs
    - cron: "40 17 * * *"  # 13:00 COT kickoffs
    - cron: "40 18 * * *"  # 14:00 COT kickoffs
    - cron: "40 19 * * *"  # 15:00 COT kickoffs
    - cron: "10 20 * * *"  # 15:30 COT kickoffs
    - cron: "40 20 * * *"  # 16:00 COT kickoffs
    - cron: "40 21 * * *"  # 17:00 COT kickoffs
    - cron: "40 22 * * *"  # 18:00 COT kickoffs
    - cron: "10 23 * * *"  # 18:30 COT kickoffs
    - cron: "40 23 * * *"  # 19:00 COT kickoffs
    - cron: "10 0 * * *"   # 19:30 COT kickoffs
    - cron: "40 0 * * *"   # 20:00 COT kickoffs
    - cron: "10 1 * * *"   # 20:30 COT kickoffs
    - cron: "40 1 * * *"   # 21:00 COT kickoffs
    - cron: "40 2 * * *"   # 22:00 COT kickoffs
    - cron: "40 3 * * *"   # 23:00 COT kickoffs
  workflow_dispatch:

jobs:
  send_reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Send reminder if a match is upcoming
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 notify_telegram.py --window 25
